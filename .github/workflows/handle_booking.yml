name: Handle Booking

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action (save_booking or send_email)'
        required: true
        default: 'save_booking'
      booking_data:
        description: 'JSON booking data'
        required: false
      name:
        description: 'Student Name'
        required: false
      email:
        description: 'Student Email'
        required: false
      student_id:
        description: 'Student ID'
        required: false
      course:
        description: 'Course'
        required: false
      subject:
        description: 'Subject'
        required: false
      reason:
        description: 'Reason'
        required: false
      day:
        description: 'Day'
        required: false
      day_display:
        description: 'Day Display'
        required: false
      time_range:
        description: 'Time Range'
        required: false

jobs:
  handle-booking:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Save Booking
        if: github.event.inputs.action == 'save_booking'
        env:
          BOOKING_DATA: ${{ github.event.inputs.booking_data }}
          GH_TOKEN: ${{ secrets.GT_TOKEN }}
          REPO: ${{ github.repository }}
        run: python3 save_booking.py

      - name: Send Email
        if: github.event.inputs.action == 'send_email'
        env:
          GMAIL_EMAIL: ${{ secrets.GMAIL_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          NAME: ${{ github.event.inputs.name }}
          EMAIL: ${{ github.event.inputs.email }}
          STUDENT_ID: ${{ github.event.inputs.student_id }}
          COURSE: ${{ github.event.inputs.course }}
          SUBJECT: ${{ github.event.inputs.subject }}
          REASON: ${{ github.event.inputs.reason }}
          DAY: ${{ github.event.inputs.day }}
          DAY_DISPLAY: ${{ github.event.inputs.day_display }}
          TIME_RANGE: ${{ github.event.inputs.time_range }}
        run: python3 send_email.py
