<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BETA Hub Reservation</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="src/style.css" />

</head>

<body>

  <div class="loading-overlay" id="loading">
    <div class="spinner"></div>
    <div class="loading-text" id="loading-text">Loading...</div>
  </div>
  <div class="toast" id="toast"></div>

  <!-- ==================== STEP 1: STUDENT INFO ==================== -->
  <div id="step1" class="screen center-screen active">
    <div class="card">
      <div class="logo-row">
        <div class="logo-icon">D</div>
        <h1>BETA Hub Reservation</h1>
      </div>
      <p class="sub">Enter your details to book an appointment</p>

      <div class="steps-bar">
        <div class="step-dot active"></div>
        <div class="step-dot"></div>
        <div class="step-dot"></div>
      </div>

      <div class="field">
        <label>Full Name *</label>
        <input type="text" id="f-name" placeholder="e.g. Dhruvik Patel" />
      </div>
      <div class="field">
        <label>DePaul Student ID *</label>
        <input type="text" id="f-id" inputmode="numeric" pattern="[0-9]*" placeholder="e.g. 2487651" />
      </div>
      <div class="field">
        <label>DePaul Email *</label>
        <input type="email" id="f-email" placeholder="e.g. dpatel@depaul.edu" />
        <div class="error-msg" id="email-err">Please use a @depaul.edu email</div>
      </div>
      <div class="field">
        <label>Course *</label>
        <input type="text" id="f-course" placeholder="e.g. CSC 555 - Mining Big Data" />
      </div>
      <div class="field">
        <label>Reason *</label>
        <textarea id="f-reason" placeholder="Brief description of why you need this slot..."></textarea>
      </div>

      <button class="btn btn-primary" onclick="goStep2()">Next — Select a Date →</button>
    </div>
  </div>

  <!-- ==================== STEP 2: SELECT DATE ==================== -->
  <div id="step2" class="screen center-screen">
    <div class="card">
      <div class="logo-row">
        <div class="logo-icon">D</div>
        <h1>Select a Date</h1>
      </div>
      <p class="sub" id="step2-user"></p>

      <div class="steps-bar">
        <div class="step-dot done"></div>
        <div class="step-dot active"></div>
        <div class="step-dot"></div>
      </div>

      <div class="cal-container">
        <div class="cal-header">
          <div class="cal-month" id="cal-month-name">April 2026</div>
          <div class="cal-nav">
            <button class="cal-btn" onclick="changeMonth(-1)">←</button>
            <button class="cal-btn" onclick="changeMonth(1)">→</button>
          </div>
        </div>
        <div class="cal-grid" id="calendar-grid"></div>
      </div>

      <button class="btn btn-primary" id="btn-to-step3" disabled onclick="goStep3()">Next — Choose a Time Slot
        →</button>
      <button class="btn btn-outline" style="margin-top:8px" onclick="showScreen('step1')">← Back</button>
    </div>
  </div>

  <!-- ==================== STEP 3: SELECT TIME SLOT ==================== -->
  <div id="step3" class="screen center-screen">
    <div class="card" style="max-width:520px">
      <div class="logo-row">
        <div class="logo-icon">D</div>
        <h1>Choose Your Slot</h1>
      </div>
      <p class="sub" id="step3-info"></p>

      <div class="steps-bar">
        <div class="step-dot done"></div>
        <div class="step-dot done"></div>
        <div class="step-dot active"></div>
      </div>

      <div class="time-grid" id="time-grid"></div>

      <button class="btn btn-primary" id="btn-book" disabled onclick="submitBooking()">Confirm Booking</button>
      <button class="btn btn-outline" style="margin-top:8px" onclick="showScreen('step2')">← Back to Dates</button>
    </div>
  </div>

  <!-- ==================== STEP 4: CONFIRMATION ==================== -->
  <div id="step4" class="screen center-screen">
    <div class="card confirm-card">
      <div class="check">✅</div>
      <h2>Booking Confirmed!</h2>
      <p class="sub-text">Your appointment has been saved.</p>
      <div class="details-box" id="confirm-details"></div>
      <div id="email-status-box"></div>
      <button class="btn btn-primary" onclick="bookAnother()">Book Another Slot</button>
    </div>
  </div>


  <script src="src/script.js" defer></script>
</body>

</html>
