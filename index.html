<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DePaul Slot Booking</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%231E4D8C'/><text x='16' y='23' text-anchor='middle' fill='white' font-size='20' font-family='Georgia'>D</text></svg>" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root{
      --blue:#1E4D8C;--blue-dark:#0d2847;--blue-light:#e8f0fe;
      --green:#d7f0d7;--green-accent:#2e7d32;
      --red:#ffcdd2;--red-dark:#c62828;
      --mine:#bbdefb;--mine-dark:#1565c0;
      --bg:#f0f2f5;--card:#fff;--text:#1a1a2e;--muted:#666;--border:#e0e0e0;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}

    /* Screens */
    .scr{display:none}
    .scr.on{display:block}
    .scr-center.on{display:flex;min-height:100vh;align-items:center;justify-content:center;padding:20px}
    #s1.on{background:linear-gradient(135deg,var(--blue) 0%,var(--blue-dark) 60%,#0a1628 100%)}

    /* Card */
    .card{background:var(--card);border-radius:16px;padding:32px 28px;width:100%;max-width:460px;box-shadow:0 8px 32px rgba(0,0,0,.1)}
    #s1 .card{box-shadow:0 20px 60px rgba(0,0,0,.3)}
    @media(max-width:480px){.card{padding:24px 18px;border-radius:12px}}

    .logo-row{display:flex;align-items:center;gap:12px;margin-bottom:6px}
    .logo-icon{width:44px;height:44px;background:var(--blue);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:#fff;font-family:Georgia,serif;flex-shrink:0}
    .card h1{font-size:19px;color:var(--blue)}
    .card .sub{font-size:13px;color:var(--muted);margin:4px 0 20px}

    /* Progress */
    .prog{display:flex;gap:6px;margin-bottom:22px}
    .prog span{flex:1;height:4px;border-radius:2px;background:#ddd}
    .prog span.done{background:var(--blue)}
    .prog span.now{background:var(--blue);opacity:.5}

    /* Fields */
    .fld{margin-bottom:14px}
    .fld label{display:block;font-size:13px;font-weight:600;color:#444;margin-bottom:5px}
    .fld input,.fld textarea{
      width:100%;padding:11px 13px;font-size:14px;border:1.5px solid #ddd;border-radius:8px;
      font-family:inherit;background:#fafafa;outline:none;transition:border .2s,box-shadow .2s;
    }
    .fld input:focus,.fld textarea:focus{border-color:var(--blue);background:#fff;box-shadow:0 0 0 3px rgba(30,77,140,.08)}
    .fld textarea{min-height:68px;resize:vertical}
    .fld-err{color:var(--red-dark);font-size:12px;margin-top:3px;display:none}

    /* Buttons */
    .btn{
      display:block;width:100%;padding:13px 20px;font-size:14px;font-weight:700;
      border:none;border-radius:8px;cursor:pointer;font-family:inherit;transition:all .2s;text-align:center;
    }
    .btn-p{color:#fff;background:var(--blue)}
    .btn-p:hover{background:var(--blue-dark)}
    .btn-o{color:var(--blue);background:#fff;border:1.5px solid #ddd;margin-top:8px}
    .btn-o:hover{background:#f5f5f5}
    .btn:disabled{opacity:.45;cursor:not-allowed}

    /* Date cards */
    .dg{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:18px}
    .dc{
      padding:14px 10px;border:2px solid var(--border);border-radius:10px;text-align:center;
      cursor:pointer;transition:all .15s;background:#fafafa;user-select:none;
    }
    .dc:hover:not(.dis){border-color:var(--blue);background:var(--blue-light)}
    .dc.sel{border-color:var(--blue);background:var(--blue-light);box-shadow:0 0 0 3px rgba(30,77,140,.12)}
    .dc .dn{font-size:14px;font-weight:700;color:var(--text)}
    .dc .dd{font-size:12px;color:var(--muted);margin-top:2px}
    .dc .sc{font-size:11px;margin-top:5px;font-weight:600}
    .dc .sc.av{color:var(--green-accent)}
    .dc .sc.na{color:var(--red-dark)}
    .dc.dis{opacity:.35;cursor:not-allowed;pointer-events:none}

    /* Time cards */
    .tg{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:18px}
    @media(min-width:480px){.tg{grid-template-columns:repeat(3,1fr)}}
    .tc{
      padding:12px 6px;border:2px solid var(--border);border-radius:8px;text-align:center;
      cursor:pointer;transition:all .15s;font-size:13px;font-weight:600;user-select:none;
    }
    .tc.op{background:var(--green);border-color:#c8e6c9}
    .tc.op:hover{border-color:var(--green-accent);background:#c8e6c9}
    .tc.tk{background:var(--red);border-color:#ef9a9a;cursor:not-allowed;opacity:.55}
    .tc.yr{background:var(--mine);border-color:var(--mine-dark)}
    .tc.sl{border-color:var(--blue);background:var(--blue-light);box-shadow:0 0 0 3px rgba(30,77,140,.12)}
    .tc .st{font-size:10px;font-weight:400;color:var(--muted);margin-top:2px}

    /* Confirmation */
    .cc{text-align:center;max-width:480px}
    .cc .ck{font-size:48px;margin-bottom:10px}
    .cc h2{font-size:21px;color:var(--blue);margin-bottom:5px}
    .cc .st{font-size:13px;color:var(--muted);margin-bottom:20px}
    .db{background:#f8f9fb;border-radius:8px;padding:14px;margin-bottom:16px;text-align:left;border:1px solid #e8eaed}
    .dr{display:flex;justify-content:space-between;padding:4px 0;font-size:13px;border-bottom:1px solid #f0f0f0;gap:8px}
    .dr:last-child{border-bottom:none}
    .dr .l{font-weight:600;color:var(--muted);flex-shrink:0}
    .dr .v{text-align:right;word-break:break-word}
    .es{padding:12px;border-radius:8px;margin-bottom:16px;text-align:left;font-size:12px;line-height:1.5}
    .es-ok{background:#e8f5e9;border:1px solid #c8e6c9;color:#2e7d32}
    .es-no{background:#fff3e0;border:1px solid #ffe0b2;color:#e65100}

    /* Loading & toast */
    .ov{position:fixed;inset:0;background:rgba(240,242,245,.93);display:none;align-items:center;justify-content:center;z-index:100;flex-direction:column;gap:10px}
    .ov.on{display:flex}
    .sp{width:32px;height:32px;border:3px solid #ddd;border-top-color:var(--blue);border-radius:50%;animation:spin .6s linear infinite}
    .lt{font-size:13px;color:var(--muted)}
    @keyframes spin{to{transform:rotate(360deg)}}
    .tt{
      position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;
      padding:10px 22px;border-radius:8px;font-size:13px;z-index:200;display:none;max-width:90vw;text-align:center;
    }
  </style>
</head>
<body>

<div class="ov" id="ov"><div class="sp"></div><div class="lt" id="lt">Loading...</div></div>
<div class="tt" id="tt"></div>


<!-- ============ STEP 1: STUDENT INFO ============ -->
<div id="s1" class="scr scr-center on">
  <div class="card">
    <div class="logo-row"><div class="logo-icon">D</div><h1>DePaul Slot Booking</h1></div>
    <p class="sub">Enter your details to book an appointment</p>
    <div class="prog"><span class="now"></span><span></span><span></span></div>

    <div class="fld"><label>Full Name *</label><input id="fn" placeholder="e.g. Dhruvik Patel" autocomplete="name" /></div>
    <div class="fld"><label>DePaul Student ID *</label><input id="fi" placeholder="e.g. 2487651" autocomplete="off" /></div>
    <div class="fld">
      <label>DePaul Email *</label>
      <input id="fe" type="email" placeholder="e.g. dpatel@depaul.edu" autocomplete="email" />
      <div class="fld-err" id="ee">Please use a @depaul.edu email</div>
    </div>
    <div class="fld"><label>Course *</label><input id="fc" placeholder="e.g. CSC 555 - Mining Big Data" /></div>
    <div class="fld"><label>Subject *</label><input id="fs" placeholder="e.g. Project Review, Office Hours" /></div>
    <div class="fld"><label>Reason *</label><textarea id="fr" placeholder="Brief description of why you need this slot..."></textarea></div>

    <button class="btn btn-p" onclick="toStep2()">Next — Select a Date →</button>
  </div>
</div>


<!-- ============ STEP 2: SELECT DATE ============ -->
<div id="s2" class="scr scr-center">
  <div class="card">
    <div class="logo-row"><div class="logo-icon">D</div><h1>Select a Date</h1></div>
    <p class="sub" id="s2u"></p>
    <div class="prog"><span class="done"></span><span class="now"></span><span></span></div>
    <div class="dg" id="dg"></div>
    <button class="btn btn-p" id="b2" disabled onclick="toStep3()">Next — Choose a Time Slot →</button>
    <button class="btn btn-o" onclick="go('s1')">← Back</button>
  </div>
</div>


<!-- ============ STEP 3: SELECT TIME ============ -->
<div id="s3" class="scr scr-center">
  <div class="card" style="max-width:520px">
    <div class="logo-row"><div class="logo-icon">D</div><h1>Choose Your Slot</h1></div>
    <p class="sub" id="s3u"></p>
    <div class="prog"><span class="done"></span><span class="done"></span><span class="now"></span></div>
    <div class="tg" id="tg"></div>
    <button class="btn btn-p" id="b3" disabled onclick="book()">Confirm Booking</button>
    <button class="btn btn-o" onclick="go('s2')">← Back to Dates</button>
  </div>
</div>


<!-- ============ STEP 4: CONFIRMATION ============ -->
<div id="s4" class="scr scr-center">
  <div class="card cc">
    <div class="ck">✅</div>
    <h2>Booking Confirmed!</h2>
    <p class="st">Your appointment has been saved.</p>
    <div class="db" id="cd"></div>
    <div id="eb"></div>
    <button class="btn btn-p" onclick="again()">Book Another Slot</button>
    <button class="btn btn-o" onclick="location.reload()">Start Over</button>
  </div>
</div>


<script>
// ================================================================
// ▼▼▼ CONFIG — UPDATE THESE VALUES FOR YOUR REPO ▼▼▼
// ================================================================
const C = {
  // ---- GitHub (required for saving bookings) ----
  GH_OWNER:  'betahubdepaul-byte',   // ← your GitHub username
  GH_REPO:   'depaul-slot-booking',    // ← your repo name
  GH_BRANCH: 'main',
  GH_PATH:   'data/bookings.json',
  GH_TOKEN:  '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',                       // ← your fine-grained PAT

  // Note: Emails are securely sent using a GitHub Action and send_email.py
  // Make sure to add GMAIL_EMAIL, GMAIL_APP_PASSWORD, and ADMIN_EMAIL to your GitHub Repository Secrets.
};
// ================================================================
// ▲▲▲ END CONFIG ▲▲▲
// ================================================================


// --- State ---
let stu = {};          // student info
let bk = [];           // all bookings array
let sha = null;        // GitHub file SHA (needed for updates)
let selDate = null;    // selected date object
let selSlot = null;    // selected time slot object


// ================================================================
// STEP 1 → 2: Validate info, load bookings, show dates
// ================================================================
function toStep2() {
  const n = g('fn'), i = g('fi'), e = g('fe'), c = g('fc'), s = g('fs'), r = g('fr');

  // Validate all fields filled
  if (!n||!i||!e||!c||!s||!r) { toast('Please fill in all fields'); return; }

  // Validate email
  if (!e.toLowerCase().endsWith('@depaul.edu')) {
    document.getElementById('ee').style.display = 'block';
    document.getElementById('fe').focus();
    return;
  }
  document.getElementById('ee').style.display = 'none';

  stu = { name:n, id:i, email:e.toLowerCase(), course:c, subject:s, reason:r };
  selDate = null;
  selSlot = null;

  loadBk().then(() => {
    renderDates();
    document.getElementById('s2u').textContent = n + ' · ' + stu.email;
    go('s2');
  });
}

function g(id) { return document.getElementById(id).value.trim(); }


// ================================================================
// STEP 2: DATE SELECTION (Mon–Thu of current week)
// ================================================================
const DAYS = ['Monday','Tuesday','Wednesday','Thursday'];

function weekDates() {
  const now = new Date();
  const wd = now.getDay(); // 0=Sun
  const mon = new Date(now);
  mon.setDate(now.getDate() - (wd === 0 ? 6 : wd - 1));
  mon.setHours(0,0,0,0);

  return DAYS.map((name, i) => {
    const d = new Date(mon);
    d.setDate(mon.getDate() + i);
    const yyyy = d.getFullYear();
    const mm = String(d.getMonth()+1).padStart(2,'0');
    const dd = String(d.getDate()).padStart(2,'0');
    return {
      name,
      iso: `${yyyy}-${mm}-${dd}`,
      display: d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'}),
      shortDisplay: d.toLocaleDateString('en-US',{month:'short',day:'numeric'}),
    };
  });
}

function slotsFor(iso) {
  return 12 - bk.filter(b => b.dayDate === iso).length; // 12 total slots per day
}

function renderDates() {
  const days = weekDates();
  const today = new Date();
  today.setHours(0,0,0,0);
  const todayISO = today.toISOString().split('T')[0];

  let h = '';
  days.forEach(d => {
    const avail = slotsFor(d.iso);
    const past = d.iso < todayISO;
    const full = avail <= 0;
    const off = past || full;
    const sel = selDate && selDate.iso === d.iso;

    h += `<div class="dc${off?' dis':''}${sel?' sel':''}" ${off?'':`onclick="pickDate('${d.name}','${d.iso}','${d.display}')"`}>
      <div class="dn">${d.name}</div>
      <div class="dd">${d.shortDisplay}</div>
      <div class="sc ${off?'na':'av'}">${past?'Past':full?'Full':avail+' slots open'}</div>
    </div>`;
  });
  document.getElementById('dg').innerHTML = h;
  document.getElementById('b2').disabled = !selDate;
}

function pickDate(name, iso, display) {
  selDate = { name, iso, display };
  selSlot = null;
  renderDates();
}


// ================================================================
// STEP 2 → 3: Show time slots for selected date
// ================================================================
function toStep3() {
  if (!selDate) return;
  renderTimes();
  document.getElementById('s3u').textContent =
    selDate.name + ', ' + selDate.display + ' · ' + stu.name;
  go('s3');
}


// ================================================================
// STEP 3: TIME SLOT SELECTION (10:00–16:00, 30-min each)
// ================================================================
function allSlots() {
  const s = [];
  for (let h=10; h<16; h++) {
    for (let m=0; m<60; m+=30) {
      const sh=String(h).padStart(2,'0'), sm=String(m).padStart(2,'0');
      const et=h*60+m+30;
      const eh=String(Math.floor(et/60)).padStart(2,'0'), em=String(et%60).padStart(2,'0');
      s.push({ id:`${sh}${sm}`, range:`${sh}:${sm} – ${eh}:${em}` });
    }
  }
  return s;
}

function renderTimes() {
  const slots = allSlots();
  let h = '';
  slots.forEach(sl => {
    const b = bk.find(x => x.dayDate===selDate.iso && x.slotId===sl.id);
    const yours = b && b.email===stu.email;
    const sel = selSlot && selSlot.id===sl.id;

    if (yours) {
      h += `<div class="tc yr">${sl.range}<div class="st">Your booking</div></div>`;
    } else if (b) {
      h += `<div class="tc tk">${sl.range}<div class="st">Taken</div></div>`;
    } else {
      h += `<div class="tc ${sel?'sl':'op'}" onclick="pickTime('${sl.id}','${sl.range}')">
        ${sl.range}<div class="st">${sel?'Selected ✓':'Available'}</div></div>`;
    }
  });
  document.getElementById('tg').innerHTML = h;
  document.getElementById('b3').disabled = !selSlot;
}

function pickTime(id, range) {
  selSlot = { id, range };
  renderTimes();
}


// ================================================================
// BOOK — save to GitHub + send email
// ================================================================
async function book() {
  if (!selDate || !selSlot) return;

  // --- 1. Re-fetch bookings to prevent double-booking ---
  ld(true, 'Checking availability...');
  try {
    await loadBk();
  } catch(e) {
    console.warn('Re-fetch failed, proceeding with local data');
  }

  const conflict = bk.find(x => x.dayDate===selDate.iso && x.slotId===selSlot.id);
  if (conflict) {
    ld(false);
    toast('This slot was just booked! Please choose another.');
    renderTimes();
    return;
  }

  // --- 2. Create booking object ---
  const entry = {
    id:         Date.now().toString(),
    name:       stu.name,
    email:      stu.email,
    studentId:  stu.id,
    course:     stu.course,
    subject:    stu.subject,
    reason:     stu.reason,
    day:        selDate.name,
    dayDate:    selDate.iso,
    dayDisplay: selDate.display,
    slotId:     selSlot.id,
    timeRange:  selSlot.range,
    bookedAt:   new Date().toISOString(),
  };

  bk.push(entry);

  // --- 3. Save to GitHub ---
  ld(true, 'Saving booking...');
  let ghOk = false;
  try {
    ghOk = await saveBk(entry);
  } catch(e) {
    console.error('GitHub save error:', e);
  }

  // --- 4. Send confirmation email ---
  ld(true, 'Sending confirmation email...');
  let emOk = false;
  try {
    emOk = await sendMail(entry);
  } catch(e) {
    console.error('Email error:', e);
  }

  ld(false);

  // --- 5. Show confirmation ---
  document.getElementById('cd').innerHTML = [
    ['Name', entry.name],
    ['Email', entry.email],
    ['Student ID', entry.studentId],
    ['Course', entry.course],
    ['Subject', entry.subject],
    ['Reason', entry.reason],
    ['Date', entry.day + ', ' + entry.dayDisplay],
    ['Time Slot', entry.timeRange],
    ['Booked At', new Date(entry.bookedAt).toLocaleString()],
  ].map(([l,v])=>`<div class="dr"><span class="l">${l}</span><span class="v">${v}</span></div>`).join('');

  let statusHTML = '';
  if (ghOk && emOk) {
    statusHTML = `<div class="es es-ok"><strong>✅ Saved to GitHub & email triggered!</strong><br>Confirmation will be sent to ${entry.email} via GitHub Actions.</div>`;
  } else if (ghOk && !emOk) {
    statusHTML = `<div class="es es-no"><strong>✅ Saved to GitHub</strong><br>⚠️ Email trigger failed. Please check your GitHub token. Booking is still saved.</div>`;
  } else if (!ghOk && emOk) {
    statusHTML = `<div class="es es-no"><strong>⚠️ GitHub save failed</strong> — check token. Email trigger was sent.</div>`;
  } else {
    statusHTML = `<div class="es es-no"><strong>⚠️ Saved locally only</strong><br>Set GitHub token in the CONFIG section of index.html to enable saving and emails.</div>`;
  }
  document.getElementById('eb').innerHTML = statusHTML;

  go('s4');
}

function again() {
  selDate = null;
  selSlot = null;
  loadBk().then(() => { renderDates(); go('s2'); });
}


// ================================================================
// GITHUB API — Read & write data/bookings.json
// ================================================================
function ghUrl() {
  return `https://api.github.com/repos/${C.GH_OWNER}/${C.GH_REPO}/contents/${C.GH_PATH}`;
}
function ghH() {
  const h = { 'Accept':'application/vnd.github.v3+json' };
  if (C.GH_TOKEN) h['Authorization'] = 'Bearer ' + C.GH_TOKEN;
  return h;
}

async function loadBk() {
  ld(true, 'Loading bookings...');
  try {
    // Try GitHub API first (works with token, gives us SHA)
    if (C.GH_TOKEN) {
      const r = await fetch(ghUrl()+'?ref='+C.GH_BRANCH, {headers:ghH()});
      if (r.ok) {
        const d = await r.json();
        sha = d.sha;
        const raw = atob(d.content.replace(/\n/g,''));
        try { bk = JSON.parse(raw); } catch { bk = []; }
        ld(false);
        return;
      }
    }
    // Fallback: raw URL (works for public repos without token)
    await loadRaw();
  } catch(e) {
    console.warn('loadBk error:', e);
    await loadRaw();
  }
  ld(false);
}

async function loadRaw() {
  try {
    const url = `https://raw.githubusercontent.com/${C.GH_OWNER}/${C.GH_REPO}/${C.GH_BRANCH}/${C.GH_PATH}?_=${Date.now()}`;
    const r = await fetch(url);
    if (r.ok) {
      const text = await r.text();
      try { bk = JSON.parse(text); } catch { bk = []; }
    } else {
      bk = [];
    }
  } catch { bk = []; }
}

async function saveBk(entry) {
  if (!C.GH_TOKEN) return false;

  // Encode JSON as base64 safely (handles unicode)
  const json = JSON.stringify(bk, null, 2);
  const bytes = new TextEncoder().encode(json);
  let binary = '';
  bytes.forEach(b => binary += String.fromCharCode(b));
  const content = btoa(binary);

  const body = {
    message: `📅 Booking: ${entry.name} — ${entry.day} ${entry.dayDisplay} ${entry.timeRange}`,
    content,
    branch: C.GH_BRANCH,
  };
  if (sha) body.sha = sha;

  try {
    const r = await fetch(ghUrl(), {
      method: 'PUT',
      headers: { ...ghH(), 'Content-Type':'application/json' },
      body: JSON.stringify(body),
    });

    if (r.ok) {
      const d = await r.json();
      sha = d.content.sha; // Update SHA for next write
      return true;
    }

    // If 409 conflict (SHA mismatch), re-fetch and retry once
    if (r.status === 409) {
      console.warn('SHA conflict — refetching and retrying...');
      await loadBk();
      // Re-add entry if it got lost
      if (!bk.find(x => x.id === entry.id)) bk.push(entry);
      return await saveBkRetry(entry);
    }

    const err = await r.json().catch(()=>({}));
    console.error('GitHub save error:', r.status, err);
    return false;
  } catch(e) {
    console.error('GitHub network error:', e);
    return false;
  }
}

async function saveBkRetry(entry) {
  const json = JSON.stringify(bk, null, 2);
  const bytes = new TextEncoder().encode(json);
  let binary = '';
  bytes.forEach(b => binary += String.fromCharCode(b));
  const content = btoa(binary);

  const body = {
    message: `📅 Booking: ${entry.name} — ${entry.day} ${entry.dayDisplay} ${entry.timeRange}`,
    content,
    branch: C.GH_BRANCH,
  };
  if (sha) body.sha = sha;

  try {
    const r = await fetch(ghUrl(), {
      method: 'PUT',
      headers: { ...ghH(), 'Content-Type':'application/json' },
      body: JSON.stringify(body),
    });
    if (r.ok) {
      const d = await r.json();
      sha = d.content.sha;
      return true;
    }
    return false;
  } catch { return false; }
}


// ================================================================
// EMAIL — via GitHub Actions Trigger
// ================================================================
async function sendMail(entry) {
  if (!C.GH_TOKEN) return false;

  try {
    const r = await fetch(`https://api.github.com/repos/${C.GH_OWNER}/${C.GH_REPO}/dispatches`, {
      method: 'POST',
      headers: { ...ghH(), 'Content-Type': 'application/json' },
      body: JSON.stringify({
        event_type: 'send_email',
        client_payload: entry
      })
    });
    
    // GitHub API returns 204 No Content for successful dispatch
    if (r.ok || r.status === 204) {
      console.log('Email trigger dispatched successfully');
      return true;
    } else {
      const err = await r.json().catch(() => ({}));
      console.error('Dispatch trigger error:', r.status, err);
      return false;
    }
  } catch(e) {
    console.error('GitHub network error:', e);
    return false;
  }
}

// UTILITIES
// ================================================================
function go(id) {
  document.querySelectorAll('.scr').forEach(s => s.classList.remove('on'));
  document.getElementById(id).classList.add('on');
  window.scrollTo({top:0,behavior:'smooth'});
}

function ld(on, txt) {
  document.getElementById('ov').classList.toggle('on', on);
  if (txt) document.getElementById('lt').textContent = txt;
}

function toast(msg) {
  const t = document.getElementById('tt');
  t.textContent = msg;
  t.style.display = 'block';
  clearTimeout(t._t);
  t._t = setTimeout(() => t.style.display = 'none', 4000);
}
